  drawdown_does_not_worsen: true
  improvements_extend_beyond_one_sector: true
  newly_admitted_days_positive_on_balance: true
  holdout_or_prospective_confirmation_required: true

failure_criteria:
  improvement_concentrated_in_one_year: true
  improvement_concentrated_in_one_sector: true
  newly_admitted_days_negative_on_balance: true
  drawdown_worsens_materially: true

decision:
  status: inconclusive
  rationale: >
    The consecutive distribution-day rule materially improved retrospective
    expectancy, trade count, and participation across 2024, 2025, and 2026 YTD
    while holding maximum drawdown flat versus the baseline. The mechanism also
    appears legitimate: 182 previously blocked days were freed, but only 36 of
    those days produced trades, and those newly admitted dates contributed
    5274.30 total P/L. Sector improvement was broad rather than Cloud-only,
    with especially large gains in Communication Services, Healthcare, and
    Semiconductors. This is strong retrospective evidence to continue research,
    but it is not sufficient for promotion without holdout or prospective
    confirmation.
  decided_at: 2026-07-01
